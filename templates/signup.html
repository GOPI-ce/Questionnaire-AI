<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — QuestionnaireAI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,400;0,500&family=Lora:ital@1&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0c10; --surface: #12151c; --surface2: #1a1e29;
  --border: #252a38; --accent: #4fffb0; --accent2: #7c6ef7;
  --text: #e8eaf0; --muted: #6b7280;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Mono', monospace;
  background: var(--bg); color: var(--text);
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(79,255,176,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(79,255,176,0.03) 1px, transparent 1px);
  background-size: 40px 40px; pointer-events: none;
}
.auth-wrap { width: 100%; max-width: 420px; padding: 20px; position: relative; z-index: 1; }
.logo { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; text-align: center; margin-bottom: 8px; }
.logo span { color: #4fffb0; }
.tagline { text-align: center; color: var(--muted); font-size: 12px; margin-bottom: 36px; font-style: italic; font-family: 'Lora', serif; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 32px; }
.card-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 24px; }
.form-group { margin-bottom: 16px; }
label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.08em; }
input {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text);
  font-family: 'DM Mono', monospace; font-size: 13px;
  padding: 12px 14px; width: 100%; outline: none; transition: border-color 0.15s;
}
input:focus { border-color: #4fffb0; }
.btn { display: block; width: 100%; padding: 13px; border-radius: 8px; background: #4fffb0; color: #000; font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 600; border: none; cursor: pointer; transition: background 0.15s; margin-top: 20px; }
.btn:hover { background: #3de89a; }
.switch { text-align: center; margin-top: 20px; font-size: 12px; color: var(--muted); }
.switch a { color: #4fffb0; text-decoration: none; }
.flash { padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; font-size: 12px; }
.flash-error { background: rgba(255,107,107,0.12); border: 1px solid rgba(255,107,107,0.3); color: #ff6b6b; }
.flash-success { background: rgba(79,255,176,0.1); border: 1px solid rgba(79,255,176,0.3); color: #4fffb0; }
</style>
</head>
<body>
<div class="auth-wrap">
  <div class="logo">Questionnaire<span>AI</span></div>
  <div class="tagline">AI-powered questionnaire automation</div>
  <div class="card">
    <div class="card-title">Create account</div>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="flash flash-{{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    <form method="POST">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="name" placeholder="Jane Smith" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="you@company.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="At least 8 characters" required minlength="8">
      </div>
      <button class="btn" type="submit">Create account →</button>
    </form>
    <div class="switch">Already have an account? <a href="/login">Sign in</a></div>
  </div>
</div>
</body>
</html>
